name: Automatyczna Aktualizacja (Codziennie 17:30)

on:
  schedule:
    - cron: '30 17 * * *'  # Codziennie o 17:30
  workflow_dispatch:  # Też ręcznie można uruchomić

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Pobierz kod
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python - zaktualizuj dane z Google Sheets
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Aktualizuj dane z Google Sheets
        run: |
          pip install requests
          python update.py

      # 3. Node.js - zbuduj stronę
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install and Build
        run: |
          npm install
          npm run build

      # 4. Deploy
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
